spring:
  application:
    name: campus-rag-backend

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/campus_rag?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: postgres
    password: 123456

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
#      logic-delete-field: deleted
#      logic-delete-value: 1
#      logic-not-delete-value: 0

# LangChain4j 配置
langchain4j:
  open-ai:
    # 阿里云 DashScope API Key（建议通过环境变量设置）
    api-key: ${DASHSCOPE_API_KEY}
    # 阿里云兼容 OpenAI 的 base URL
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    chat-model:
      # 聊天模型：通义千问
      model-name: qwen3.6-flash
      temperature: 0.7
      timeout: PT30S
    embedding-model:
      # 向量模型：通义千问文本嵌入
      model-name: text-embedding-v4
      timeout: PT30S

# pgvector 配置（LangChain4j 使用）
pgvector:
  host: localhost
  port: 5432
  database: campus_rag
  user: postgres
  password: 123456
  table: embeddings
  dimension: 1024  # text-embedding-v4 的向量维度

# RAG 检索配置
rag:
  retrieval:
    top-k: 5              # 默认返回 Top-K 个结果
    min-score: 0.4        # 最低相似度阈值（0.0-1.0）

# Elasticsearch 配置
elasticsearch:
  host: localhost
  port: 9200
  index-name: document_chunks

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    com.hznu.campusragbackend: debug
    org.springframework.web: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
